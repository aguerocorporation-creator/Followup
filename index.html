<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FollowUp Engine</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#181c27;--bg3:#1e2235;--bg4:#242840;
  --border:#2a2f45;--border2:#333852;
  --text:#e8eaf0;--text2:#9ba3bf;--text3:#6b7494;
  --hot:#ff4d6d;--hot-bg:#ff4d6d18;
  --warm:#f97316;--warm-bg:#f9731618;
  --cold:#38bdf8;--cold-bg:#38bdf818;
  --green:#22c55e;--green-bg:#22c55e18;
  --purple:#a78bfa;--purple-bg:#a78bfa18;
  --yellow:#eab308;--yellow-bg:#eab30818;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:18px 16px 12px;font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px;border-bottom:1px solid var(--border)}
.sidebar-logo span{color:var(--hot)}
.nav-section{padding:16px 10px 8px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);transition:all .15s;font-size:13.5px;margin:1px 6px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text);font-weight:500}
.nav-item .icon{width:16px;text-align:center;font-size:14px}
.nav-badge{margin-left:auto;background:var(--hot);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:600;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn:hover{background:var(--bg4)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--hot);border-color:var(--hot);color:#fff}
.btn-primary:hover{background:#e63659;border-color:#e63659}
.btn-sm{padding:5px 10px;font-size:12px}
.content{padding:20px 24px;flex:1}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.hot .stat-val{color:var(--hot)}
.stat-card.warm .stat-val{color:var(--warm)}
.stat-card.cold .stat-val{color:var(--cold)}
.stat-card.overdue .stat-val{color:var(--yellow)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:var(--text)}
.section-count{font-size:12px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:99px;border:1px solid var(--border)}
.tasks-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:900px){.tasks-grid{grid-template-columns:1fr}}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;transition:border-color .15s}
.task-card:hover{border-color:var(--border2)}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.task-card.hot::before{background:var(--hot)}
.task-card.warm::before{background:var(--warm)}
.task-card.cold::before{background:var(--cold)}
.task-card.overdue{border-color:#eab30840}
.task-card.overdue::after{content:'OVERDUE';position:absolute;right:12px;top:12px;font-size:9px;font-weight:700;color:var(--yellow);background:var(--yellow-bg);padding:2px 6px;border-radius:99px;letter-spacing:.5px}
.task-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.task-name{font-size:14px;font-weight:600;color:var(--text)}
.task-type{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:3px 8px;border-radius:99px}
.task-type.call{background:#3b82f620;color:#60a5fa}
.task-type.sms{background:#22c55e20;color:#4ade80}
.task-type.email{background:#a78bfa20;color:#c4b5fd}
.task-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text3);margin-bottom:10px}
.task-attempts{display:flex;gap:4px;align-items:center}
.attempt-dot{width:6px;height:6px;border-radius:50%}
.attempt-dot.done{background:var(--hot)}
.attempt-dot.empty{background:var(--border2)}
.task-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.outcome-btn{font-size:11px;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.outcome-btn:hover{background:var(--bg4);color:var(--text)}
.outcome-btn.answered:hover{background:#22c55e20;border-color:#22c55e60;color:var(--green)}
.outcome-btn.sent:hover{background:#22c55e20;border-color:#22c55e60;color:var(--green)}
.outcome-btn.noanswer:hover{background:#f9731620;border-color:#f9731660;color:var(--warm)}
.outcome-btn.notint:hover{background:#ff4d6d20;border-color:#ff4d6d60;color:var(--hot)}
.outcome-btn:disabled{opacity:.4;cursor:not-allowed}
.leads-table{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;padding:10px 16px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.table-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .12s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--bg3)}
.lead-name-col{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.avatar.hot{background:var(--hot-bg);color:var(--hot)}
.avatar.warm{background:var(--warm-bg);color:var(--warm)}
.avatar.cold{background:var(--cold-bg);color:var(--cold)}
.avatar.inactive{background:var(--bg3);color:var(--text3)}
.lead-info .name{font-size:13.5px;font-weight:500;color:var(--text)}
.lead-info .phone{font-size:11px;color:var(--text3)}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.3px}
.status-badge.hot{background:var(--hot-bg);color:var(--hot)}
.status-badge.warm{background:var(--warm-bg);color:var(--warm)}
.status-badge.cold{background:var(--cold-bg);color:var(--cold)}
.status-badge.inactive{background:var(--bg3);color:var(--text3)}
.status-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.next-action{font-size:11px;color:var(--text2);background:var(--bg3);padding:3px 7px;border-radius:99px;border:1px solid var(--border)}
.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.timeline-item::before{content:'';position:absolute;left:15px;top:28px;bottom:-8px;width:1px;background:var(--border)}
.timeline-item:last-child::before{display:none}
.tl-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1}
.tl-icon.call{background:#3b82f620;color:#60a5fa}
.tl-icon.sms{background:#22c55e20;color:#4ade80}
.tl-icon.email{background:#a78bfa20;color:#c4b5fd}
.tl-icon.system{background:var(--bg3);color:var(--text3)}
.tl-content .tl-title{font-size:13px;font-weight:500;color:var(--text)}
.tl-content .tl-sub{font-size:11px;color:var(--text3);margin-top:2px}
.tl-outcome{display:inline-flex;margin-top:4px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:99px}
.tl-outcome.answered{background:var(--green-bg);color:var(--green)}
.tl-outcome.noanswer{background:var(--yellow-bg);color:var(--yellow)}
.tl-outcome.voicemail{background:var(--purple-bg);color:var(--purple)}
.lead-detail{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.lead-detail-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr 1fr}}
.detail-cell{padding:14px 20px;border-right:1px solid var(--border)}
.detail-cell:last-child{border-right:none}
.detail-cell .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-cell .val{font-size:14px;font-weight:500;color:var(--text)}
.detail-body{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:800px){.detail-body{grid-template-columns:1fr}}
.detail-section{padding:20px 24px;border-right:1px solid var(--border)}
.detail-section:last-child{border-right:none}
.detail-section h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.wf-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;position:relative}
.wf-step::before{content:'';position:absolute;left:14px;top:32px;bottom:-10px;width:1px;border-left:1px dashed var(--border2)}
.wf-step:last-child::before{display:none}
.wf-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;z-index:1;background:var(--bg2)}
.wf-dot.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.wf-dot.active{border-color:var(--hot);background:var(--hot-bg);color:var(--hot)}
.wf-dot.pending{border-color:var(--border2);color:var(--text3)}
.wf-text .wf-title{font-size:13px;font-weight:500;color:var(--text)}
.wf-text .wf-time{font-size:11px;color:var(--text3);margin-top:2px}
.toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:1000;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);max-width:340px;animation:slideIn .2s ease;display:flex;align-items:flex-start;gap:8px;transition:opacity .3s}
.toast.success{border-left:3px solid var(--green)}
.toast.warning{border-left:3px solid var(--yellow)}
.toast.info{border-left:3px solid var(--cold)}
.toast.error{border-left:3px solid var(--hot)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{position:fixed;inset:0;background:#000000bb;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:560px;overflow:hidden}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--hot)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.settings-section h3{padding:14px 18px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;color:var(--text)}
.settings-sub{font-size:11px;color:var(--text3);margin-top:2px}
.settings-input{padding:5px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:99px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--hot)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.template-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
.priority{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.priority.high{background:var(--hot)}
.priority.medium{background:var(--warm)}
.priority.low{background:var(--cold)}
.prog-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:99px}
.prog-fill.hot{background:var(--hot)}.prog-fill.warm{background:var(--warm)}.prog-fill.cold{background:var(--cold)}
.search-bar{position:relative;flex:1;max-width:260px}
.search-bar input{width:100%;padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.empty-state{text-align:center;padding:40px;color:var(--text3)}
.empty-state .icon{font-size:32px;margin-bottom:10px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--hot);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:400px}
.auth-card h1{font-size:22px;font-weight:700;margin-bottom:4px}
.auth-card h1 span{color:var(--hot)}
/* Health status */
.health-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:6px}
.health-dot.ok{background:var(--green)}
.health-dot.warning{background:var(--yellow)}
.health-dot.error{background:var(--hot)}
.health-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.health-row:last-child{border-bottom:none}
/* Cal sync badge */
.cal-badge{font-size:9px;padding:1px 5px;border-radius:99px;font-weight:700;margin-left:6px}
.cal-badge.synced{background:var(--green-bg);color:var(--green)}
.cal-badge.failed{background:var(--hot-bg);color:var(--hot)}
.cal-badge.pending{background:var(--yellow-bg);color:var(--yellow)}

/* ── SEQUENCE UI ─────────────────────────────── */
.seq-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.seq-container.hot{border-left:3px solid var(--hot)}
.seq-container.warm{border-left:3px solid var(--warm)}
.seq-container.cold{border-left:3px solid var(--cold)}
.seq-container.overdue-lead{border-color:#eab30860}
.seq-header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);cursor:pointer}
.seq-header:hover{background:var(--bg3)}
.seq-lead-info{flex:1}
.seq-lead-name{font-size:14px;font-weight:600;color:var(--text)}
.seq-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.seq-progress-bar{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px;width:120px}
.seq-progress-fill{height:100%;border-radius:99px;transition:width .3s}
.seq-progress-fill.hot{background:var(--hot)}
.seq-progress-fill.warm{background:var(--warm)}
.seq-progress-fill.cold{background:var(--cold)}
.seq-steps{display:flex;gap:0;overflow-x:auto;padding:12px 16px;scrollbar-width:none}
.seq-steps::-webkit-scrollbar{display:none}
.seq-step{display:flex;flex-direction:column;align-items:center;min-width:100px;position:relative}
.seq-step:not(:last-child)::after{content:'';position:absolute;right:-1px;top:14px;width:calc(100% - 24px);height:2px;background:var(--border);left:50%;z-index:0}
.seq-step.done:not(:last-child)::after{background:var(--green)}
.seq-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg2);z-index:1;flex-shrink:0}
.seq-dot.done{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.seq-dot.active{background:var(--hot-bg);border-color:var(--hot);color:var(--hot)}
.seq-dot.overdue{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow)}
.seq-dot.pending{color:var(--text3)}
.seq-step-label{font-size:10px;color:var(--text3);margin-top:5px;text-align:center;line-height:1.3;max-width:90px}
.seq-step-label.active{color:var(--text);font-weight:600}
.seq-step-label.done{color:var(--green)}
.seq-step-actions{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--bg3)}
.seq-step-info{font-size:12px;color:var(--text2);flex:1}
.seq-last-next{padding:8px 16px;display:flex;gap:16px;font-size:11px;background:var(--bg3);border-top:1px solid var(--border)}
.seq-last-next span{color:var(--text3)}
.seq-last-next strong{color:var(--text2)}
.step-label-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.3px;flex-shrink:0}
.step-label-badge.hot{background:var(--hot-bg);color:var(--hot)}
.step-label-badge.warm{background:var(--warm-bg);color:var(--warm)}
.step-label-badge.cold{background:var(--cold-bg);color:var(--cold)}
.step-label-badge.inactive{background:var(--bg3);color:var(--text3)}
.seq-type-pill{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600}
.seq-type-pill.call{background:#3b82f620;color:#60a5fa}
.seq-type-pill.sms{background:#22c55e20;color:#4ade80}
.seq-type-pill.email{background:#a78bfa20;color:#c4b5fd}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen" style="display:none">
  <div class="auth-card">
    <h1>⚡ Follow<span>Up</span> Engine</h1>
    <p style="font-size:13px;color:var(--text3);margin-bottom:24px">Sign in to continue</p>
    <div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="you@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" style="flex:1" onclick="signIn()">Sign In</button>
      <button class="btn" style="flex:1" onclick="signUp()">Create Account</button>
    </div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
// Only public-safe values here. NO secrets.
const SUPABASE_URL  = 'https://mcsmiqkjyidtlwmomjoq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jc21pcWtqeWlkdGx3bW9tam9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTg2MDEsImV4cCI6MjA5MTc5NDYwMX0.RDk5Y5SMCaknNUayfhZcNFh5m8ElRLFNrs8xaoGW4qw';
const FN = (name) => `${SUPABASE_URL}/functions/v1/${name}`;

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ─────────────────────────────────────────────────────
let currentView  = 'dashboard';
let selectedLead = null;
let currentUser  = null;
let allLeads     = [];
let allTasks     = [];
let workflowCfg  = {};
let realtimeSub  = null;
let pollingTimer = null;
let processingOutcome = false;

// ── AUTH ──────────────────────────────────────────────────────
async function initApp() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) { currentUser = session.user; await showApp(); }
  else showAuthScreen();

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      currentUser = session.user;
      await showApp();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      clearInterval(pollingTimer);
      showAuthScreen();
    }

async function signIn() {
  const email = document.getElementById('auth-email').value?.trim();
  const pass  = document.getElementById('auth-password').value;
  if (!email || !pass) { setAuthError('Email and password required'); return; }
  try {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) setAuthError(error.message);
  } catch(e) { setAuthError('Connection error — check your internet and try again.'); }
}

async function signUp() {
  const email = document.getElementById('auth-email').value?.trim();
  const pass  = document.getElementById('auth-password').value;
  if (!email || !pass) { setAuthError('Email and password required'); return; }
  if (pass.length < 6) { setAuthError('Password must be at least 6 characters'); return; }
  try {
    const { data, error } = await sb.auth.signUp({ email, password: pass, options: { emailRedirectTo: window.location.href } });
    if (error) setAuthError(error.message);
    else if (data?.user?.identities?.length === 0) setAuthError('Account exists — click Sign In.', false);
    else setAuthError('Check your email, click the confirmation link, then Sign In here.', false);
  } catch(e) { setAuthError('Connection error — check your internet and try again.'); }
}

function setAuthError(msg, isError=true) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.color = isError ? 'var(--hot)' : 'var(--green)';
}

async function signOut() {
  await sb.auth.signOut();
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-footer').innerHTML =
    `<div style="color:var(--text2);word-break:break-all">${currentUser.email}</div>
     <div onclick="signOut()" style="cursor:pointer;color:var(--hot);margin-top:4px">Sign out</div>`;
  await loadData();
  setupRealtime();
  startPolling();
  render();
}

// ── DATA LOADING ──────────────────────────────────────────────
async function loadData() {
  await Promise.all([loadLeads(), loadTasks(), loadWorkflowConfig()]);
  updateBadge();
}

async function loadLeads() {
  const { data, error } = await sb
    .from('leads').select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });
  if (!error) allLeads = data || [];
  else showToast('Failed to load leads: ' + error.message, 'error');
}

async function loadTasks() {
  const now = new Date();
  const { data, error } = await sb
    .from('tasks').select('*')
    .eq('user_id', currentUser.id)
    .neq('status', 'cancelled')
    .order('due_at', { ascending: true });
  if (!error) {
    allTasks = (data || []).map(t => ({
      ...t, overdue: t.status === 'pending' && new Date(t.due_at) < now
    }));
  } else showToast('Failed to load tasks: ' + error.message, 'error');
}

async function loadActivities(leadId) {
  const { data } = await sb
    .from('activities').select('*')
    .eq('lead_id', leadId)
    .order('created_at', { ascending: true });
  return data || [];
}

async function loadWorkflowConfig() {
  const { data } = await sb
    .from('workflow_configs').select('*')
    .eq('user_id', currentUser.id).single();
  if (data) workflowCfg = data;
}

// ── REALTIME ──────────────────────────────────────────────────
function setupRealtime() {
  if (realtimeSub) sb.removeChannel(realtimeSub);
  realtimeSub = sb.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'leads', filter: `user_id=eq.${currentUser.id}` },
      () => loadLeads().then(() => { updateBadge(); if (!processingOutcome) render(); }))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: `user_id=eq.${currentUser.id}` },
      () => loadTasks().then(() => { updateBadge(); if (!processingOutcome) render(); }))
    .subscribe();
}

function startPolling() {
  clearInterval(pollingTimer);
  pollingTimer = setInterval(async () => {
    await loadTasks();
    updateBadge();
    checkInAppAlerts();
    if (!selectedLead && !processingOutcome) render();
  }, 60000);
}

function checkInAppAlerts() {
  const now = new Date();
  const fiveMinAgo = new Date(now - 5 * 60 * 1000);
  allTasks.filter(t => {
    const due = new Date(t.due_at);
    return t.status === 'pending' && due <= now && due > fiveMinAgo;
  }).forEach(t => showToast(`⚡ Due Now: ${t.action_type.toUpperCase()} ${t.lead_name}`, 'warning'));
}

// ── API CALL (Edge Functions only — no fallback) ──────────────
async function callFn(name, body) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) throw new Error('Not authenticated');

  const res = await fetch(FN(name), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${session.access_token}`,
    },
    body: JSON.stringify(body),
  });

  const data = await res.json();

  if (!res.ok || !data.success) {
    throw new Error(data.error || `Function ${name} failed (${res.status})`);
  }

  // Show warnings as non-blocking toasts
  if (data.data?.warnings?.length) {
    data.data.warnings.forEach(w => showToast(`⚠ ${w}`, 'warning'));
  }

  return data.data;
}

// ── OUTCOME PROCESSING ─────────────────────────────────────────
// NO fallback. Backend is the single source of truth.
async function processOutcome(leadId, taskId, outcome) {
  if (processingOutcome) return;
  processingOutcome = true;
  document.querySelectorAll('.outcome-btn').forEach(b => b.disabled = true);
  showToast('Processing...', 'info');

  // Try Edge Function first, fall back to direct DB if unavailable
  let usedEdgeFunction = false;
  try {
    const result = await callFn('process-outcomes', {
      lead_id: leadId, task_id: taskId || null, outcome,
    });
    usedEdgeFunction = true;
    const msgs = {
      workflow_paused:    '✓ Lead answered — workflow paused',
      retry_scheduled:    'No answer logged — next call scheduled',
      downgraded_to_warm: 'Lead downgraded to WARM — warm workflow started',
      lead_inactive:      'Lead marked inactive — all tasks stopped',
    };
    const type = outcome==='answered'?'success':outcome==='notinterested'?'warning':'info';
    showToast(msgs[result.action] || 'Outcome logged', type);
    if (outcome === 'answered') openAnsweredModal(leadId);
  } catch(e) {
    // Edge Function unavailable — run locally
    console.warn('Edge Function unavailable, running locally:', e.message);
    try {
      await localOutcome(leadId, taskId, outcome);
    } catch(e2) {
      showToast('Error: ' + e2.message, 'error');
      document.querySelectorAll('.outcome-btn').forEach(b => b.disabled = false);
      processingOutcome = false;
      return;
    }
  }

  await loadData();
  if (selectedLead?.id === leadId) selectedLead = allLeads.find(l=>l.id===leadId) || null;
  processingOutcome = false;
  render();
}

async function localOutcome(leadId, taskId, outcome) {
  const now  = new Date();
  const lead = allLeads.find(l=>l.id===leadId);
  if (!lead) throw new Error('Lead not found');

  // Get task type so we can route correctly
  const task = taskId ? allTasks.find(t=>t.id===taskId) : null;
  const taskType = task?.action_type || 'call';
  const stepLabel = task?.sequence_step_label || getTaskSequenceLabel(task||{}, lead) || '';

  // Mark task completed
  if (taskId) {
    await sb.from('tasks').update({
      status:'completed', outcome, completed_at:now.toISOString()
    }).eq('id', taskId);
  }

  // ── EMAIL SENT / REPLIED / BOUNCED ───────────────────────────
  if (taskType === 'email' && (outcome === 'sent' || outcome === 'replied' || outcome === 'bounced')) {
    const newEmailCount = (lead.emails_sent||0) + 1;
    const outcomeLabels = {sent:'Email sent', replied:'Email — reply received', bounced:'Email bounced'};
    await sb.from('leads').update({
      emails_sent: newEmailCount,
      last_contact_at: now.toISOString(),
    }).eq('id', leadId);
    await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
      type:'email',
      title: outcomeLabels[outcome] + (stepLabel ? ` — ${stepLabel}` : ''),
      description: outcome === 'bounced' ? 'Email bounced — check address' : 'Sequence step completed',
      outcome });
    const toastMap = {sent:'✓ Email marked sent — sequence continues', replied:'✓ Reply received!', bounced:'Email bounced — step logged'};
    showToast(toastMap[outcome]||'Email logged', outcome==='bounced'?'warning':'success');
    return; // workflow continues naturally — no new task needed
  }

  // ── SMS SENT / REPLIED / FAILED ──────────────────────────────
  if (taskType === 'sms' && (outcome === 'sent' || outcome === 'replied' || outcome === 'failed')) {
    const newSmsCount = (lead.sms_sent||0) + 1;
    const outcomeLabels = {sent:'SMS sent', replied:'SMS — reply received', failed:'SMS failed'};
    await sb.from('leads').update({
      sms_sent: newSmsCount,
      last_contact_at: now.toISOString(),
    }).eq('id', leadId);
    await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
      type:'sms',
      title: outcomeLabels[outcome] + (stepLabel ? ` — ${stepLabel}` : ''),
      description: outcome === 'failed' ? 'SMS delivery failed' : 'Sequence step completed',
      outcome });
    const toastMap = {sent:'✓ SMS marked sent — sequence continues', replied:'✓ Reply received!', failed:'SMS failed — step logged'};
    showToast(toastMap[outcome]||'SMS logged', outcome==='failed'?'warning':'success');
    return; // workflow continues naturally
  }

  // ── CALL: NO ANSWER ──────────────────────────────────────────
  if (outcome === 'noanswer') {
    const newAttempts = (lead.call_attempts||0) + 1;
    const retryH = workflowCfg.hot_retry_hours || 3;
    const nextCall = new Date(now.getTime() + retryH*3600000);
    const maxAtt = workflowCfg.hot_max_attempts || 6;
    const shouldDowngrade = newAttempts >= maxAtt && lead.status === 'hot';

    await sb.from('leads').update({
      call_attempts: newAttempts,
      last_contact_at: now.toISOString(),
      next_action_label: shouldDowngrade ? 'Warm Day 1 — Call' : `Call retry in ${retryH}h`,
      ...(shouldDowngrade ? { status:'warm', score:Math.max(0,(lead.score||60)-15) } : {})
    }).eq('id', leadId);

    await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
      type:'call', title:`Call — No Answer #${newAttempts}`, description:'No answer logged', outcome:'noanswer' });

    if (!shouldDowngrade) {
      await sb.from('tasks').insert({
        lead_id:leadId, lead_name:lead.name, action_type:'call',
        due_at:nextCall.toISOString(), priority:'high', user_id:currentUser.id,
        attempt_number:newAttempts+1,
        sequence_step_label:`Retry Call #${newAttempts+1}`,
        sequence_type: lead.status,
      });
      showToast(`No answer — retry call in ${retryH}h`, 'info');
    } else {
      const MS=86400000;
      const cfg = workflowCfg;
      const warmSteps = [
        {days:0,  a:cfg.warm_day1_action||'call',  p:'high',   step:1, lbl:'Day 1 — Call'},
        {days:3,  a:cfg.warm_day3_action||'email', p:'medium', step:2, lbl:'Day 3 — Email'},
        {days:7,  a:cfg.warm_day7_action||'call',  p:'medium', step:3, lbl:'Day 7 — Call'},
        {days:14, a:cfg.warm_day14_action||'email',p:'low',    step:4, lbl:'Day 14 — Check-In'},
      ];
      for (const s of warmSteps) {
        await sb.from('tasks').insert({
          lead_id:leadId, lead_name:lead.name, action_type:s.a,
          due_at:new Date(now.getTime()+s.days*MS).toISOString(), priority:s.p, user_id:currentUser.id,
          sequence_type:'warm', sequence_step_number:s.step, sequence_step_label:s.lbl,
        });
      }
      await sb.from('tasks').update({status:'cancelled'})
        .eq('lead_id',leadId).eq('status','pending').neq('id',taskId||'00000000-0000-0000-0000-000000000000');
      await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
        type:'system', title:'Auto-downgraded to WARM', description:`${maxAtt} call attempts — warm workflow started` });
      showToast(`${lead.name} downgraded to WARM after ${newAttempts} attempts`, 'warning');
    }
    return;
  }

  // ── CALL: VOICEMAIL ──────────────────────────────────────────
  if (outcome === 'voicemail') {
    const newAttempts = (lead.call_attempts||0) + 1;
    const nextCall = new Date(now.getTime() + 4*3600000);
    await sb.from('leads').update({
      call_attempts:newAttempts, last_contact_at:now.toISOString(), next_action_label:'Call retry in 4h'
    }).eq('id', leadId);
    await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
      type:'call', title:'Call — Voicemail', description:'Left voicemail message', outcome:'voicemail' });
    await sb.from('tasks').insert({
      lead_id:leadId, lead_name:lead.name, action_type:'call',
      due_at:nextCall.toISOString(), priority:'high', user_id:currentUser.id,
      sequence_step_label:'Retry Call (Voicemail)', sequence_type:lead.status,
    });
    showToast('Voicemail logged — retry in 4h', 'info');
    return;
  }

  // ── CALL: ANSWERED ───────────────────────────────────────────
  if (outcome === 'answered') {
    await sb.from('leads').update({
      engaged:true, last_contact_at:now.toISOString(), next_action_label:'Follow-up scheduled'
    }).eq('id', leadId);
    await sb.from('tasks').update({status:'cancelled'}).eq('lead_id',leadId).eq('status','pending');
    await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
      type:'call', title:'Call — Answered', description:'Lead answered — workflow paused', outcome:'answered' });
    showToast('✓ Lead answered! Workflow paused.', 'success');
    openAnsweredModal(leadId);
    return;
  }

  // ── NOT INTERESTED (any task type) ───────────────────────────
  if (outcome === 'notinterested') {
    await sb.from('leads').update({ status:'inactive', score:0, engaged:false, next_action_label:'Inactive' }).eq('id', leadId);
    await sb.from('tasks').update({status:'cancelled'}).eq('lead_id',leadId).eq('status','pending');
    await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
      type:'system', title:'Lead marked inactive', description:'Not interested — all tasks stopped' });
    showToast('Lead marked inactive — all tasks stopped', 'warning');
  }
}

async function quickOutcome(leadId, outcome) {
  // Find the next pending task for this lead (sorted by due_at)
  const task = allTasks
    .filter(t => t.lead_id === leadId && t.status === 'pending')
    .sort((a,b) => new Date(a.due_at) - new Date(b.due_at))[0];
  await processOutcome(leadId, task?.id || null, outcome);
}

async function logOutcomeTask(taskId, leadId, outcome) {
  await processOutcome(leadId, taskId, outcome);
}

// ── UTILITIES ─────────────────────────────────────────────────
function outcomeLabel(o) {
  return {sent:'Sent ✓',replied:'Replied',answered:'Answered',noanswer:'No answer',
    voicemail:'Voicemail',bounced:'Bounced',failed:'Failed',notinterested:'Not interested'}[o] || o || 'Done';
}
function initials(name) { return (name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }

function fmtTime(iso) {
  if (!iso) return 'Never';
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 60000)    return 'Just now';
  if (diff < 3600000)  return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  const days = Math.floor(diff/86400000);
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString();
}

function fmtDue(iso) {
  if (!iso) return 'N/A';
  const d = new Date(iso), now = new Date(), diff = d - now;
  if (diff < 0) {
    const overMin = Math.floor(-diff/60000);
    return overMin < 60 ? `Overdue ${overMin}m` : `Overdue ${Math.floor(overMin/60)}h`;
  }
  if (diff < 3600000)  return `In ${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return `Today ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  const days = Math.ceil(diff/86400000);
  return days < 7 ? `In ${days}d` : d.toLocaleDateString();
}

function updateBadge() {
  document.getElementById('dash-badge').textContent =
    allTasks.filter(t => t.status === 'pending').length;
}

function showToast(msg, type='info') {
  const tc = document.getElementById('toast-container');
  const t  = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = {success:'✓',warning:'⚠',info:'ℹ',error:'✕'}[type]||'ℹ';
  t.innerHTML = `<span style="font-weight:700;flex-shrink:0">${icon}</span><span style="line-height:1.4">${msg}</span>`;
  tc.appendChild(t);
  setTimeout(() => t.style.opacity = '0', 4000);
  setTimeout(() => t.remove(), 4500);
}

function openModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

// ── NAVIGATION ────────────────────────────────────────────────
function showView(v, el) {
  currentView = v; selectedLead = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  (el || document.getElementById('nav-'+v))?.classList.add('active');
  render();
}

// ── SEQUENCE HELPERS ──────────────────────────────────────────
function getSequenceDef(status, cfg) {
  cfg = cfg || workflowCfg;
  if (status === 'hot') return [
    {step:1, day:0,  label:'Immediate Call',    action:'call',  desc:'Call now'},
    {step:2, day:0,  label:'SMS if No Answer',  action:'sms',   desc:'Auto SMS'},
    {step:3, day:1,  label:'2nd Call',          action:'call',  desc:`+${cfg.hot_retry_hours||3}h retry`},
    {step:4, day:1,  label:'3rd Call',          action:'call',  desc:'Same-day retry'},
    {step:5, day:2,  label:'Day 2 Follow-up',   action:'call',  desc:'Next-day attempt'},
  ];
  if (status === 'warm') return [
    {step:1, day:1,  label:'Day 1 — Call',      action:cfg.warm_day1_action||'call',  desc:'First touch'},
    {step:2, day:3,  label:'Day 3 — Email',     action:cfg.warm_day3_action||'email', desc:'Email follow-up'},
    {step:3, day:7,  label:'Day 7 — Call',      action:cfg.warm_day7_action||'call',  desc:'Mid-sequence call'},
    {step:4, day:14, label:'Day 14 — Check-In', action:cfg.warm_day14_action||'email',desc:'Final check-in'},
  ];
  return [
    {step:1, day:7,  label:'Day 7 — Light Touch', action:cfg.cold_day7_action||'sms',   desc:'Light touch'},
    {step:2, day:30, label:'Day 30 — Re-Engage',  action:cfg.cold_day30_action||'email', desc:'Re-engagement'},
    {step:3, day:60, label:'Day 60 — Recycle',    action:cfg.cold_day60_action||'email', desc:'Final recycle'},
  ];
}

// Return the correct outcome button label and outcome value for a task type
function getOutcomeButtons(task) {
  const t = task.action_type;
  if (t === 'email') return [
    {label:'✓ Sent',        outcome:'sent',          cls:'sent'},
    {label:'↩ Replied',     outcome:'replied',        cls:'answered'},
    {label:'✕ Bounced',     outcome:'bounced',        cls:'noanswer'},
    {label:'Not Interested',outcome:'notinterested',  cls:'notint'},
  ];
  if (t === 'sms') return [
    {label:'✓ Sent',        outcome:'sent',          cls:'sent'},
    {label:'↩ Replied',     outcome:'replied',        cls:'answered'},
    {label:'✕ Failed',      outcome:'failed',         cls:'noanswer'},
    {label:'Not Interested',outcome:'notinterested',  cls:'notint'},
  ];
  // call (default)
  return [
    {label:'✓ Answered',    outcome:'answered',       cls:'answered'},
    {label:'No Answer',     outcome:'noanswer',       cls:'noanswer'},
    {label:'Voicemail',     outcome:'voicemail',      cls:''},
    {label:'Not Interested',outcome:'notinterested',  cls:'notint'},
  ];
}

// True if outcome counts as workflow-continuing completion (not "answered" a call)
function isCompletionOutcome(outcome) {
  return ['sent','replied','bounced','failed'].includes(outcome);
}

// Get task sequence label — use stored label first, fall back to sequence def
function getTaskLabel(task, lead) {
  if (task.sequence_step_label) return task.sequence_step_label;
  return getTaskSequenceLabel(task, lead);
}

function getTaskSequenceLabel(task, lead) {
  if (!lead) return task.action_type;
  const seq = getSequenceDef(lead.status);
  const leadTasks = allTasks
    .filter(t => t.lead_id === lead.id)
    .sort((a,b) => new Date(a.due_at) - new Date(b.due_at));
  const idx = leadTasks.findIndex(t => t.id === task.id);
  if (idx >= 0 && idx < seq.length) return seq[idx].label;
  const icons = {call:'Call',sms:'SMS',email:'Email'};
  return icons[task.action_type] || task.action_type;
}

function getLeadSequenceProgress(leadId) {
  const lead = allLeads.find(l=>l.id===leadId);
  if (!lead) return {done:0,total:0,pct:0};
  const seq = getSequenceDef(lead.status);
  const leadTasks = allTasks.filter(t=>t.lead_id===leadId&&t.status!=='cancelled');
  const done = leadTasks.filter(t=>t.status==='completed').length;
  const total = Math.max(seq.length, leadTasks.length);
  return {done, total, pct: total > 0 ? Math.round((done/total)*100) : 0};
}

function renderLeadSequenceCard(lead) {
  const leadTasks = allTasks
    .filter(t=>t.lead_id===lead.id && t.status!=='cancelled')
    .sort((a,b)=>new Date(a.due_at)-new Date(b.due_at));
  const seq = getSequenceDef(lead.status);
  const prog = getLeadSequenceProgress(lead.id);
  const now = new Date();
  const nextTask = leadTasks.find(t=>t.status==='pending');
  const lastDone = [...leadTasks].reverse().find(t=>t.status==='completed');
  const hasOverdue = leadTasks.some(t=>t.overdue&&t.status==='pending');
  const statusEmoji = {hot:'🔥',warm:'🌡',cold:'❄️',inactive:'⛔'}[lead.status]||'';
  const typeIcons = {call:'📞',sms:'💬',email:'✉️'};

  // Build sequence steps — match by sequence_step_number if available, else by index
  const stepsHtml = seq.map((step, i) => {
    let task = leadTasks.find(t => t.sequence_step_number === step.step) || leadTasks[i];
    let dotClass = 'pending', dotContent = i+1;
    let labelClass = 'pending';

    if (task) {
      if (task.status === 'completed') { dotClass='done'; dotContent='✓'; labelClass='done'; }
      else if (task.overdue) { dotClass='overdue'; dotContent='!'; labelClass='active'; }
      else if (task === nextTask) { dotClass='active'; dotContent='→'; labelClass='active'; }
    }

    const timeInfo = task
      ? (task.status==='completed'
          ? ({sent:'Sent',replied:'Replied',answered:'Answered',noanswer:'No answer',voicemail:'Voicemail',bounced:'Bounced',failed:'Failed'}[task.outcome]||task.outcome||'Done')
          : fmtDue(task.due_at))
      : step.desc;

    return `<div class="seq-step ${dotClass}">
      <div class="seq-dot ${dotClass}">${dotContent}</div>
      <div class="seq-step-label ${labelClass}">${step.label}<br><span style="font-size:9px;opacity:.7">${timeInfo}</span></div>
    </div>`;
  }).join('');

  // Last/next action info
  const lastStr = lastDone
    ? `Last: ${getTaskSequenceLabel(lastDone,lead)} · ${lastDone.outcome||'done'} · ${fmtTime(lastDone.completed_at||lastDone.due_at)}`
    : 'No actions yet';
  const nextStr = nextTask
    ? `Next: ${getTaskSequenceLabel(nextTask,lead)} ${typeIcons[nextTask.action_type]||''} · ${fmtDue(nextTask.due_at)}`
    : lead.engaged ? 'Lead engaged ✓' : 'Sequence complete';

  return `
  <div class="seq-container ${lead.status} ${hasOverdue?'overdue-lead':''}" onclick="openLeadDetail('${lead.id}')">
    <div class="seq-header">
      <div class="avatar ${lead.status}" style="width:36px;height:36px;font-size:12px;border-radius:50%;flex-shrink:0">${initials(lead.name)}</div>
      <div class="seq-lead-info">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="seq-lead-name">${lead.name}</div>
          <span class="step-label-badge ${lead.status}">${statusEmoji} ${lead.status.toUpperCase()}</span>
          ${hasOverdue?'<span style="font-size:9px;font-weight:700;color:var(--yellow);background:var(--yellow-bg);padding:2px 6px;border-radius:99px">OVERDUE</span>':''}
        </div>
        <div class="seq-meta">
          <span>${lead.phone}</span>
          <span>·</span>
          <span style="color:var(--text2)">${prog.done}/${prog.total} steps done</span>
        </div>
        <div class="seq-progress-bar" style="margin-top:6px">
          <div class="seq-progress-fill ${lead.status}" style="width:${prog.pct}%"></div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);text-align:right;flex-shrink:0">
        <div style="color:var(--text2);font-weight:500">${prog.pct}%</div>
        <div>complete</div>
      </div>
    </div>
    <div class="seq-last-next" onclick="event.stopPropagation()">
      <span>⏮ <strong>${lastStr}</strong></span>
      <span>⏭ <strong style="color:${nextTask?'var(--text)':'var(--green)'}">${nextStr}</strong></span>
    </div>
    <div class="seq-steps" onclick="event.stopPropagation()">${stepsHtml}</div>
    ${nextTask ? `
    <div class="seq-step-actions" onclick="event.stopPropagation()">
      <div class="seq-step-info">
        <span class="seq-type-pill ${nextTask.action_type}">${typeIcons[nextTask.action_type]} ${getTaskLabel(nextTask, lead)}</span>
        <span style="margin-left:8px;color:var(--text3)">${fmtDue(nextTask.due_at)}</span>
      </div>
      ${getOutcomeButtons(nextTask).map(b =>
        `<button class="outcome-btn ${b.cls}" onclick="logOutcomeTask('${nextTask.id}','${lead.id}','${b.outcome}')">${b.label}</button>`
      ).join('')}
    </div>` : ''}
  </div>`;
}

function render() {
  const main = document.getElementById('main-content');
  if (!main) return;
  if (selectedLead) {
    main.innerHTML = '<div class="content"><div class="loading"><div class="spinner"></div> Loading lead...</div></div>';
    renderLeadDetail(main).catch(e => {
      selectedLead = null;
      main.innerHTML = `<div class="content"><div style="color:var(--hot);padding:40px">Error loading lead: ${e.message}<br><button class="btn" onclick="render()" style="margin-top:12px">← Go Back</button></div></div>`;
    });
    return;
  }
  if (currentView === 'health') { renderHealth(main).catch(console.error); return; }
  const views = {dashboard:renderDashboard, leads:renderLeads, tasks:renderTasksView, calendar:renderCalendar, settings:renderSettings};
  (views[currentView] || renderDashboard)(main);
}

// ── CALENDAR ──────────────────────────────────────────────────
function renderCalendar(main) {
  const now = new Date(), year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = now.toLocaleString('default',{month:'long'});
  const tasksByDay = {};
  allTasks.filter(t=>t.status==='pending').forEach(t=>{
    const d = new Date(t.due_at);
    if (d.getMonth()===month && d.getFullYear()===year) {
      if (!tasksByDay[d.getDate()]) tasksByDay[d.getDate()]=[];
      tasksByDay[d.getDate()].push(t);
    }
  });
  const upcoming = allTasks.filter(t=>t.status==='pending'&&new Date(t.due_at)>=now).sort((a,b)=>new Date(a.due_at)-new Date(b.due_at)).slice(0,10);

  main.innerHTML = `
  <div class="topbar"><div class="topbar-title">📅 ${monthName} ${year}</div>
    <div style="font-size:13px;color:var(--text3)">Calendar sync via Google Calendar API</div></div>
  <div class="content">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div style="padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--text3)">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr)">
        ${Array.from({length:firstDay},()=>`<div style="padding:8px;min-height:70px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)"></div>`).join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1, isToday=day===now.getDate(), ev=tasksByDay[day]||[];
          return `<div style="padding:8px;min-height:70px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);${isToday?'background:var(--bg3)':''}">
            <div style="font-size:12px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--hot)':'var(--text3)'};margin-bottom:4px">${day}</div>
            ${ev.slice(0,2).map(t=>{const l=allLeads.find(l=>l.id===t.lead_id);return`<div style="font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;background:var(--${l?.status||'warm'}-bg);color:var(--${l?.status||'warm'});overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${new Date(t.due_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ${t.lead_name.split(' ')[0]}</div>`}).join('')}
            ${ev.length>2?`<div style="font-size:9px;color:var(--text3)">+${ev.length-2}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="section-header"><div class="section-title">Upcoming Tasks</div></div>
    ${upcoming.map(t=>{const l=allLeads.find(x=>x.id===t.lead_id),s=l?.status||'warm';const icons={call:'📞',sms:'💬',email:'✉️'};
      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:var(--${s}-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${icons[t.action_type]}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">${t.action_type.toUpperCase()}: ${t.lead_name}</div>
          <div style="font-size:11px;color:var(--text3)">${fmtDue(t.due_at)} · ${l?.phone||''} ${t.external_event_id?'· <span style="color:var(--green);font-size:10px">📅 Cal synced</span>':''}</div></div>
        <span class="status-badge ${s}">${s.toUpperCase()}</span>
        ${t.overdue?`<span style="font-size:9px;color:var(--yellow);font-weight:700">OVERDUE</span>`:''}
      </div>`;
    }).join('')||'<div class="empty-state"><div class="icon">📅</div><p>No upcoming tasks</p></div>'}
  </div>`;
}

  const payload = {
    notification_phone:        g('s-notifphone')?.value||'',
    notification_email:        g('s-notifmail')?.value||'',
    twilio_enabled:            g('s-twilio')?.checked||false,
    email_enabled:             g('s-email')?.checked||false,
    gcal_enabled:              g('s-gcal')?.checked||false,
    hot_retry_hours:           parseInt(g('s-retry')?.value||'3'),
    hot_max_attempts:          parseInt(g('s-maxatt')?.value||'6'),
    hot_auto_sms:              g('s-autosms')?.checked||false,
    warm_day1_action:          g('s-w1')?.value||'call',
    warm_day3_action:          g('s-w3')?.value||'email',
    warm_day7_action:          g('s-w7')?.value||'call',
    warm_day14_action:         g('s-w14')?.value||'email',
    cold_day7_action:          g('s-c7')?.value||'sms',
    cold_day30_action:         g('s-c30')?.value||'email',
    sms_missed_call_template:  g('s-tmpl-missed')?.value||'',
    sms_warm_followup:         g('s-tmpl-warm')?.value||'',
    sms_cold_reengage:         g('s-tmpl-cold')?.value||'',

function buildDetailSequence(lead) {
  const seq = getSequenceDef(lead.status);
  const lTasks = allTasks
    .filter(t => t.lead_id === lead.id && t.status !== 'cancelled')
    .sort((a,b) => new Date(a.due_at) - new Date(b.due_at));
  const prog = getLeadSequenceProgress(lead.id);
  const typeIcons = {call:'📞', sms:'💬', email:'✉️'};

  const stepsHtml = seq.map((step, i) => {
    // Match by sequence_step_number if available, fall back to index
    let task = lTasks.find(t => t.sequence_step_number === step.step);
    if (!task) task = lTasks[i];

    const isDone    = task && task.status === 'completed';
    const isOverdue = task && task.overdue && task.status === 'pending';
    const completedSoFar = lTasks.filter(t => t.status === 'completed').length;
    const isActive  = task && task.status === 'pending' && completedSoFar === i;
    const dotClass  = isDone ? 'done' : isOverdue ? 'overdue' : isActive ? 'active' : 'pending';
    const dotIcon   = isDone ? '✓'   : isOverdue ? '!'       : isActive ? '→'      : (i+1);

    // Show outcome label for completed steps
    let timeStr;
    if (isDone) {
      const outcomeLabel = {
        sent:'Sent', replied:'Replied', answered:'Answered',
        noanswer:'No answer', voicemail:'Voicemail', bounced:'Bounced', failed:'Failed'
      }[task.outcome] || task.outcome || 'Done';
      timeStr = '✓ ' + outcomeLabel + ' · ' + fmtTime(task.completed_at || task.due_at);
    } else if (task) {
      timeStr = (isOverdue ? '⚠ ' : '') + fmtDue(task.due_at);
    } else {
      timeStr = step.desc;
    }

    return '<div class="wf-step">'
      + '<div class="wf-dot ' + dotClass + '">' + dotIcon + '</div>'
      + '<div class="wf-text">'
      + '<div class="wf-title">' + step.label + ' ' + (typeIcons[step.action]||'') + '</div>'
      + '<div class="wf-time">' + timeStr + '</div>'
      + '</div></div>';
  }).join('');

  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    + '<div style="font-size:12px;color:var(--text3)">' + prog.done + ' of ' + prog.total + ' steps done</div>'
    + '<div style="flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden">'
    + '<div style="height:100%;width:' + prog.pct + '%;background:var(--' + lead.status + ');border-radius:99px"></div>'
    + '</div>'
    + '<div style="font-size:12px;font-weight:600;color:var(--' + lead.status + ')">' + prog.pct + '%</div>'
    + '</div>'
    + stepsHtml;
}

function getWorkflowSteps(lead, completedCount) {
  if (lead.status==='hot') return [
    {title:'Immediate call',time:'Assigned',status:'done'},
    {title:'SMS on no answer',time:'Auto',status:(lead.call_attempts||0)>=1?'done':'pending'},
    {title:'2nd call',time:`+${workflowCfg.hot_retry_hours||3}h`,status:(lead.call_attempts||0)>=2?'done':'active'},
    {title:'Further attempts',time:'Cadence',status:(lead.call_attempts||0)>=3?'done':'pending'},
    {title:'Downgrade at max attempts',time:'Auto',status:'pending'},
  ];
  if (lead.status==='warm') return [
    {title:'Day 1 touch',time:'Day 1',status:'done'},
    {title:'Day 3 follow-up',time:'Day 3',status:completedCount>=2?'done':'active'},
    {title:'Day 7 call',time:'Day 7',status:completedCount>=3?'done':'pending'},
    {title:'Day 14 check-in',time:'Day 14',status:completedCount>=4?'done':'pending'},
  ];
  return [
    {title:'Day 7 touch',time:'Day 7',status:completedCount>=1?'done':'active'},
    {title:'Day 30 re-engage',time:'Day 30',status:completedCount>=2?'done':'pending'},
    {title:'Day 60 recycle',time:'Day 60',status:completedCount>=3?'done':'pending'},
  ];
}

async function setNextAction(leadId, action) {
  const map = {appointment:'Appointment scheduled',offer:'Offer sent',followup:'Follow-up scheduled',qualified:'Lead qualified ✓'};
  await sb.from('leads').update({ next_action_label: map[action] }).eq('id', leadId);
  await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
    type:'system', title:map[action], description:'Set after answered call' });
  closeModal();
  showToast(map[action], 'success');
  await loadData();
  if (selectedLead?.id===leadId) selectedLead = allLeads.find(l=>l.id===leadId);
  render();
}

async function changeStatus(leadId, newStatus) {
  const lead = allLeads.find(l=>l.id===leadId);
  if (!lead||lead.status===newStatus) return;
  await sb.from('leads').update({ status:newStatus }).eq('id', leadId);
  await sb.from('activities').insert({ lead_id:leadId, user_id:currentUser.id,
    type:'system', title:`Status → ${newStatus.toUpperCase()}`,
    description:`${lead.status.toUpperCase()} → ${newStatus.toUpperCase()}` });
  showToast(`${lead.name} moved to ${newStatus.toUpperCase()}`, 'info');
  await loadData();
  if (selectedLead?.id===leadId) selectedLead = allLeads.find(l=>l.id===leadId);
  render();
}

    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" id="ef-email" value="${l.email||''}"></div>
      <div class="form-group"><label>Lead Type</label>
        <select id="ef-type">
          ${['Buyer','Seller','Renter','Investor'].map(t=>`<option value="${t}" ${l.lead_type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Address</label><input type="text" id="ef-address" value="${l.address||''}"></div>
    <div class="form-row">
      <div class="form-group"><label>Status</label>
        <select id="ef-status">
          ${['hot','warm','cold','inactive'].map(s=>`<option value="${s}" ${l.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Score (0–100)</label><input type="number" id="ef-score" value="${l.score}" min="0" max="100"></div>
    </div>
    <div class="form-group"><label>Next Action Label</label><input type="text" id="ef-next" value="${l.next_action_label||''}"></div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveLead('${l.id}')">Save Changes</button>
  </div>`);
}

async function saveLead(id) {
  const g = x => document.getElementById(x)?.value?.trim();
  const updates = {
    name:              g('ef-name'),
    phone:             g('ef-phone'),
    email:             g('ef-email')||null,
    address:           g('ef-address')||null,
    lead_type:         g('ef-type'),
    status:            g('ef-status'),
    score:             parseInt(g('ef-score'))||60,
    next_action_label: g('ef-next')||null,
  };
  if (!updates.name || !updates.phone) { showToast('Name and phone required','warning'); return; }
  const { error } = await sb.from('leads').update(updates).eq('id', id);
  if (error) { showToast('Save failed: '+error.message,'error'); return; }
  await sb.from('activities').insert({ lead_id:id, user_id:currentUser.id,
    type:'system', title:'Lead details updated', description:`Edited by user` });
  closeModal();
  showToast('Lead updated successfully','success');
  await loadData();
  selectedLead = allLeads.find(l=>l.id===id)||null;
  render();
}

function confirmDeleteLead(id, name) {
  openModal(`
  <div class="modal-header"><h3>Delete Lead</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <p style="font-size:14px;color:var(--text);margin-bottom:12px">Are you sure you want to delete <strong>${name}</strong>?</p>
    <p style="font-size:13px;color:var(--text3)">This will permanently delete the lead, all tasks, and all activity history. This cannot be undone.</p>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" style="background:var(--hot);border-color:var(--hot)" onclick="deleteLead('${id}')">Yes, Delete Lead</button>
  </div>`);
}

async function deleteLead(id) {
  const { error } = await sb.from('leads').delete().eq('id', id);
  if (error) { showToast('Delete failed: '+error.message,'error'); return; }
  closeModal();
  selectedLead = null;
  showToast('Lead deleted','warning');
  await loadData();
  render();
}

// ── ADD LEAD ──────────────────────────────────────────────────
function openAddLead() {
  openModal(`
  <div class="modal-header"><h3>Add New Lead</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-row">
      <div class="form-group"><label>First Name *</label><input type="text" id="nf" placeholder="John"></div>
      <div class="form-group"><label>Last Name</label><input type="text" id="nl" placeholder="Smith"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone *</label><input type="tel" id="np" placeholder="+15025550100"></div>
      <div class="form-group"><label>Email</label><input type="email" id="ne" placeholder="john@email.com"></div>
    </div>
    <div class="form-group"><label>Address / Property</label><input type="text" id="na" placeholder="123 Main St, Louisville KY"></div>
    <div class="form-row">
      <div class="form-group"><label>Lead Type</label><select id="nt"><option>Buyer</option><option>Seller</option><option>Renter</option><option>Investor</option></select></div>
      <div class="form-group"><label>Status *</label><select id="ns"><option value="hot">🔥 Hot</option><option value="warm">🌡 Warm</option><option value="cold">❄️ Cold</option></select></div>
    </div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text2)">
      ⚡ Workflow tasks will be created in the database and synced to Google Calendar.
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="add-lead-btn" onclick="addLead()">Add Lead & Start Workflow</button>
  </div>`);
}

async function addLead() {
  const g = id => document.getElementById(id);
  const fname  = g('nf')?.value?.trim();
  const lname  = g('nl')?.value?.trim()||'';
  const phone  = g('np')?.value?.trim();
  const email  = g('ne')?.value?.trim()||'';
  const address= g('na')?.value?.trim()||'';
  const type   = g('nt')?.value||'Buyer';
  const status = g('ns')?.value||'hot';

  if (!fname) { showToast('First name required', 'warning'); return; }
  if (!phone) { showToast('Phone number required', 'warning'); return; }

  const btn = document.getElementById('add-lead-btn');
  if (btn) { btn.textContent = 'Adding...'; btn.disabled = true; }

  try {
    // Try Edge Function first
    await callFn('create-task', {
      name: `${fname} ${lname}`.trim(),
      phone, email, address, lead_type: type, status,
    });
    closeModal();
    showToast(`${fname} ${lname} added — ${status.toUpperCase()} workflow scheduled!`, 'success');
    await loadData();
    render();
  } catch (e) {
    // Edge function not deployed — direct DB insert with clear warning
    showToast(`Edge Function unavailable: ${e.message}. Creating lead directly.`, 'warning');

    const score = status==='hot'?90:status==='warm'?60:30;
    const now = new Date(), MS = 86400000;
    const { data: lead, error } = await sb.from('leads').insert({
      name:`${fname} ${lname}`.trim(), phone, email, address,
      lead_type: type, status, score, user_id: currentUser.id,
      next_action_label: status==='hot'?'Call Now':status==='warm'?'Call today':'Day 7 touch',
    }).select().single();

    if (error) { showToast('Failed to add lead: '+error.message, 'error'); if(btn){btn.textContent='Add Lead & Start Workflow';btn.disabled=false;} return; }

    await sb.from('activities').insert({ lead_id:lead.id, user_id:currentUser.id,
      type:'system', title:`Lead added as ${status.toUpperCase()}`,
      description:'Created directly (Edge Function unavailable)' });

    const schedDef = status==='hot'
      ? [{d:0, a:'call',  p:'high',   step:1, lbl:'Immediate Call'}]
      : status==='warm'
        ? [{d:0,  a:workflowCfg.warm_day1_action||'call',  p:'high',   step:1, lbl:'Day 1 — Call'},
           {d:3,  a:workflowCfg.warm_day3_action||'email', p:'medium', step:2, lbl:'Day 3 — Email'},
           {d:7,  a:workflowCfg.warm_day7_action||'call',  p:'medium', step:3, lbl:'Day 7 — Call'},
           {d:14, a:workflowCfg.warm_day14_action||'email',p:'low',    step:4, lbl:'Day 14 — Check-In'}]
        : [{d:7,  a:workflowCfg.cold_day7_action||'sms',   p:'medium', step:1, lbl:'Day 7 — Light Touch'},
           {d:30, a:workflowCfg.cold_day30_action||'email', p:'low',   step:2, lbl:'Day 30 — Re-Engage'},
           {d:60, a:workflowCfg.cold_day60_action||'email', p:'low',   step:3, lbl:'Day 60 — Recycle'}];

    const taskRows = schedDef.map(s => ({
      lead_id:lead.id, lead_name:lead.name, action_type:s.a,
      due_at: new Date(now.getTime()+s.d*MS).toISOString(),
      priority:s.p, user_id:currentUser.id,
      sequence_type: status,
      sequence_step_number: s.step,
      sequence_step_label: s.lbl,
    }));
    if (taskRows.length) await sb.from('tasks').insert(taskRows);

    closeModal();
    showToast(`${fname} ${lname} added (no calendar sync — deploy Edge Functions to enable)`, 'warning');
    await loadData();
    render();
  }
}

// ── BOOT ──────────────────────────────────────────────────────
initApp();
</script>
</body>
</html>
